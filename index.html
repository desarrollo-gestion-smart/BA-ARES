< !DOCTYPE html >
    <html lang="en">
        <head>
            <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>BAÑARES</title>
                    <script src="https://cdn.tailwindcss.com"></script>
                    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
                    <style>
        /* Custom scrollbar hiding and smooth scrolling for mobile fallback */
                        .no-scrollbar::-webkit-scrollbar {
                            display: none;
        }
                        .no-scrollbar {
                            -ms - overflow - style: none;
                        scrollbar-width: none;
        }

                        /* Premium custom easing for transitions */
                        .ease-premium {
                            transition - timing - function: cubic- bezier(0.16, 1, 0.3, 1);
        }

                        /* Ruler tick pattern */
                        .ruler-pattern {
                            background - image: repeating-linear-gradient(90deg, #111111 0, #111111 1px, transparent 1px, transparent 12px);
        }

                        /* Force hardware acceleration and prevent sub-pixel blurring */
                        .antialiased-image {
                            -webkit - backface - visibility: hidden;
                        backface-visibility: hidden;
                        transform: translateZ(0);
                        image-rendering: -webkit-optimize-contrast;
                        image-rendering: high-quality;
        }
                    </style>
                </head>
                <body class="bg-[#F7F6F2] text-[#111111] antialiased min-h-screen flex flex-col font-sans overflow-hidden selection:bg-[#C6A16E] selection:text-[#F7F6F2]">

                    <!-- Custom Cursor -->
                    <div id="cursor-wrapper" class="fixed top-0 left-0 pointer-events-none z-[100] will-change-transform hidden md:block">
                        <div id="cursor-visual" class="w-24 h-24 bg-[#111111] text-[#F7F6F2] rounded-full flex items-center justify-center text-xs tracking-widest uppercase font-medium transition-all duration-300 ease-out opacity-0 scale-50 -translate-x-1/2 -translate-y-1/2 shadow-xl">
                            comprar
                        </div>
                    </div>

                    <!-- Header / Brand Title -->
                    <header class="absolute top-8 md:top-12 w-full flex flex-col items-center justify-center z-50 pointer-events-none px-6">
                        <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-medium tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-b from-[#111111] via-[#111111]/90 to-[#111111]/30 drop-shadow-sm leading-none pb-1">
                            BAÑARES
                        </h1>
                        <div class="mt-2 flex items-center gap-4 opacity-50">
                            <span class="w-8 h-[1px] bg-gradient-to-r from-transparent to-[#111111]"></span>
                            <span class="text-xs font-medium tracking-[0.3em] uppercase text-[#111111]">Parfums</span>
                            <span class="w-8 h-[1px] bg-gradient-to-l from-transparent to-[#111111]"></span>
                        </div>
                    </header>

                    <!-- Main Editorial Section -->
                    <main class="relative flex-grow flex flex-col justify-center items-center w-full px-6 py-24 z-10 mt-12 md:mt-0">

                        <!-- Background Ambient Elements -->
                        <div class="absolute inset-0 pointer-events-none flex justify-between items-center px-12 opacity-[0.03] text-9xl tracking-tighter font-semibold select-none z-0">
                            <span>01</span>
                            <span>02</span>
                        </div>

                        <!-- Left Editorial Text -->
                        <div class="absolute left-8 lg:left-16 top-1/2 -translate-y-1/2 hidden md:block z-20 pointer-events-none mix-blend-difference text-[#F7F6F2]">
                            <h2 class="text-2xl font-medium tracking-tight uppercase leading-none mb-1">Olfactory Mastery.</h2>
                            <p class="text-base text-white/70 uppercase tracking-widest font-normal">Curated Essences.</p>
                        </div>

                        <!-- Right Editorial Text -->
                        <div class="absolute right-8 lg:right-16 top-1/2 -translate-y-1/2 hidden md:block text-right z-20 pointer-events-none mix-blend-difference text-[#F7F6F2]">
                            <h2 class="text-2xl font-medium tracking-tight uppercase leading-none mb-1">Ethereal Aromas.</h2>
                            <p class="text-base text-white/70 uppercase tracking-widest font-normal">Timeless Scents.</p>
                        </div>

                        <!-- Parallax Media Stack -->
                        <div id="media-stack" class="relative w-full max-w-5xl aspect-square sm:aspect-[4/3] lg:aspect-[21/9] flex items-center justify-center z-10 group perspective-1000">

                            <!-- Left Supporting Image -->
                            <div id="media-left" class="absolute w-[45%] sm:w-1/3 lg:w-[28%] aspect-[3/4] -translate-x-[60%] sm:-translate-x-[70%] lg:-translate-x-[90%] -rotate-6 transition-all duration-1000 ease-premium shadow-2xl origin-bottom-right rounded-sm overflow-hidden z-0 antialiased-image transform-gpu">
                                <img src="" alt="Supporting Left" class="w-full h-full object-cover transition-opacity duration-700 ease-in-out opacity-0" id="img-left">
                                    <div class="absolute inset-0 bg-[#111111]/10"></div>
                            </div>

                            <!-- Right Supporting Image -->
                            <div id="media-right" class="absolute w-[45%] sm:w-1/3 lg:w-[28%] aspect-[3/4] translate-x-[60%] sm:translate-x-[70%] lg:translate-x-[90%] rotate-6 transition-all duration-1000 ease-premium shadow-2xl origin-bottom-left rounded-sm overflow-hidden z-0 antialiased-image transform-gpu">
                                <img src="" alt="Supporting Right" class="w-full h-full object-cover transition-opacity duration-700 ease-in-out opacity-0" id="img-right">
                                    <div class="absolute inset-0 bg-[#111111]/10"></div>
                            </div>

                            <!-- Center Primary Media -->
                            <a href="#" id="media-center-link" class="absolute w-[60%] sm:w-[45%] lg:w-[35%] aspect-[4/5] sm:aspect-[3/4] z-20 cursor-pointer md:cursor-none group/center transform-gpu will-change-transform">
                                <div id="media-center-scale" class="w-full h-full relative transition-transform duration-700 ease-premium shadow-[0_30px_60px_rgba(17,17,17,0.3)] hover:scale-[1.02] rounded-sm overflow-hidden bg-[#F7F6F2] antialiased-image">
                                    <div id="media-center-container" class="w-full h-full relative">
                                        <!-- Media injected via JS -->
                                    </div>

                                    <!-- Dark Hover Overlay -->
                                    <div class="absolute inset-0 bg-[#111111]/20 opacity-0 group-hover/center:opacity-100 transition-opacity duration-500 ease-out pointer-events-none"></div>
                                </div>
                            </a>

                        </div>
                    </main>

                    <!-- Bottom Ticker Navigation -->
                    <nav class="w-full relative z-30 bg-[#F7F6F2] pb-6">
                        <!-- Top Ruler Tick -->
                        <div class="w-full h-2 ruler-pattern opacity-15"></div>

                        <!-- Ticker Container -->
                        <div class="relative w-full overflow-hidden py-4 sm:py-6 border-y border-[#111111]/10">

                            <!-- Fade masks for edges -->
                            <div class="absolute left-0 top-0 bottom-0 w-16 sm:w-32 bg-gradient-to-r from-[#F7F6F2] to-transparent z-10 pointer-events-none"></div>
                            <div class="absolute right-0 top-0 bottom-0 w-16 sm:w-32 bg-gradient-to-l from-[#F7F6F2] to-transparent z-10 pointer-events-none"></div>

                            <!-- Scrolling Track -->
                            <div id="ticker-track" class="flex items-center w-max transition-transform duration-1000 ease-premium px-[50vw]">
                                <!-- Items injected via JS -->
                            </div>
                        </div>

                        <!-- Bottom Ruler Tick -->
                        <div class="w-full h-3 ruler-pattern opacity-15" style="background-position: bottom;"></div>

                        <!-- Footer Meta Info -->
                        <div class="flex justify-between items-center px-6 py-4 text-xs tracking-tight text-[#111111]/50 uppercase font-medium">
                            <span>©2024 BAÑARES</span>
                            <span class="hidden sm:inline">EXPLORE THE COLLECTION</span>
                            <div class="flex gap-4">
                                <button class="hover:text-[#111111] transition-colors flex items-center justify-center"><iconify-icon icon="solar:alt-arrow-left-linear" width="16" height="16"></iconify-icon></button>
                                <span id="counter">01 // 02</span>
                                <button class="hover:text-[#111111] transition-colors flex items-center justify-center"><iconify-icon icon="solar:alt-arrow-right-linear" width="16" height="16"></iconify-icon></button>
                            </div>
                        </div>
                    </nav>

                    <script>
        // Product Data Array
                        const products = [
                        {
                            id: 'hiroshima',
                        name: "Hiroshima",
                        media: {
                            type: 'image',
                        src: 'https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/7d2c11e6-7f8a-4022-88c4-bb84ec47c483_1600w.webp'
                },
                        leftImage: 'https://images.unsplash.com/photo-1615634260167-c8cdede054de?q=80&w=1964&auto=format&fit=crop',
                        rightImage: 'https://images.unsplash.com/photo-1588405748880-12d1d2a59f75?q=80&w=1887&auto=format&fit=crop',
                        link: '/product/hiroshima'
            },
                        {
                            id: 'nagasaki',
                        name: "Nagasaki",
                        media: {
                            type: 'image',
                        src: 'https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/e16c27ff-3bf2-4335-a8cd-27e408d4cc8e_1600w.webp'
                },
                        leftImage: 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=1753&auto=format&fit=crop',
                        rightImage: 'https://images.unsplash.com/photo-1615525287515-b5f7abfc9076?q=80&w=1974&auto=format&fit=crop',
                        link: '/product/nagasaki'
            }
                        ];

                        // State
                        let activeIndex = 0;
                        let isTransitioning = false;

                        // DOM Elements
                        const track = document.getElementById('ticker-track');
                        const imgLeft = document.getElementById('img-left');
                        const imgRight = document.getElementById('img-right');
                        const centerContainer = document.getElementById('media-center-container');
                        const centerLink = document.getElementById('media-center-link');
                        const counter = document.getElementById('counter');

                        // Custom Cursor Elements
                        const cursorWrapper = document.getElementById('cursor-wrapper');
                        const cursorVisual = document.getElementById('cursor-visual');

                        // Initialization
                        function init() {
                            // Build Ticker HTML
                            products.forEach((product, index) => {
                                const el = document.createElement('div');
                                el.className = `ticker-item text-3xl sm:text-5xl lg:text-7xl tracking-tight uppercase whitespace-nowrap cursor-pointer transition-all duration-700 ease-out px-6 sm:px-12 select-none ${index === 0 ? 'font-medium text-[#111111]' : 'font-normal text-[#111111]/30'}`;
                                el.innerText = product.name;
                                el.dataset.index = index;

                                // Click interaction
                                el.addEventListener('click', () => changeProduct(index));

                                // Hover preview interaction
                                el.addEventListener('mouseenter', () => {
                                    if (index !== activeIndex && !isTransitioning) previewProduct(index);
                                });
                                el.addEventListener('mouseleave', () => {
                                    if (index !== activeIndex && !isTransitioning) previewProduct(activeIndex);
                                });

                                track.appendChild(el);
                            });

                        // Initial load without animation delay
                        updateMedia(0, true);
                        updateTickerPosition();

            // Custom Cursor Events
            centerLink.addEventListener('mouseenter', () => {
                            cursorVisual.classList.remove('opacity-0', 'scale-50');
                        cursorVisual.classList.add('opacity-100', 'scale-100');
            });
            centerLink.addEventListener('mouseleave', () => {
                            cursorVisual.classList.add('opacity-0', 'scale-50');
                        cursorVisual.classList.remove('opacity-100', 'scale-100');
            });
        }

                        // Change Product (Click)
                        function changeProduct(index) {
            if (index === activeIndex || isTransitioning) return;
                        activeIndex = index;
                        updateMedia(index);
                        updateTickerUI();
                        updateTickerPosition();
                        counter.innerText = `0${index + 1} // 0${products.length}`;
        }

                        // Preview Product (Hover)
                        function previewProduct(index) {
                            updateMedia(index, false, true);
        }

                        // Update Media Elements
                        function updateMedia(index, initial = false, isPreview = false) {
                            isTransitioning = true;
                        const product = products[index];

                        // Fade out current
                        if (!initial) {
                            imgLeft.classList.remove('opacity-100');
                        imgRight.classList.remove('opacity-100');
                        imgLeft.classList.add('opacity-0');
                        imgRight.classList.add('opacity-0');
                        if(centerContainer.firstElementChild) {
                            centerContainer.firstElementChild.style.opacity = '0';
                }
            }

                        const transitionDelay = initial ? 0 : 300;

            setTimeout(() => {
                // Update Link
                if (!isPreview) centerLink.href = product.link;

                        // Update Side Images
                        imgLeft.src = product.leftImage;
                        imgRight.src = product.rightImage;

                        // Update Center Media
                        centerContainer.innerHTML = ''; // Clear current
                        let newMedia;

                        if (product.media.type === 'video') {
                            newMedia = document.createElement('video');
                        newMedia.src = product.media.src;
                        newMedia.autoplay = true;
                        newMedia.loop = true;
                        newMedia.muted = true;
                        newMedia.playsInline = true;
                } else {
                            newMedia = document.createElement('img');
                        newMedia.src = product.media.src;
                }

                        newMedia.className = 'w-full h-full object-cover transition-opacity duration-700 ease-in-out antialiased-image';
                        newMedia.style.opacity = '0';
                        centerContainer.appendChild(newMedia);

                        // Force reflow and fade in
                        void newMedia.offsetWidth;

                        imgLeft.classList.remove('opacity-0');
                        imgRight.classList.remove('opacity-0');
                        imgLeft.classList.add('opacity-100');
                        imgRight.classList.add('opacity-100');
                        newMedia.style.opacity = '1';

                setTimeout(() => {isTransitioning = false; }, 700);

            }, transitionDelay);
        }

                        // Update Ticker Text Styles
                        function updateTickerUI() {
            const items = document.querySelectorAll('.ticker-item');
            items.forEach((item, idx) => {
                if (idx === activeIndex) {
                            item.classList.remove('font-normal', 'text-[#111111]/30');
                        item.classList.add('font-medium', 'text-[#111111]');
                } else {
                            item.classList.remove('font-medium', 'text-[#111111]');
                        item.classList.add('font-normal', 'text-[#111111]/30');
                }
            });
        }

                        // Center the active ticker item
                        function updateTickerPosition() {
            const items = document.querySelectorAll('.ticker-item');
                        if (!items.length) return;

                        const activeEl = items[activeIndex];
                        const elRect = activeEl.getBoundingClientRect();

                        // Translate the track so the element's center is at window width / 2
                        const targetX = (window.innerWidth / 2) - (activeEl.offsetLeft + (elRect.width / 2));

                        track.style.transform = `translate3d(${targetX}px, 0, 0)`;
        }

                        // Parallax Effect & Cursor Variables
                        let targetX = 0, targetY = 0;
                        let currentX = 0, currentY = 0;
                        let mouseX = 0, mouseY = 0;
                        let cursorX = 0, cursorY = 0;

                        const stack = document.getElementById('media-stack');
                        const mLeft = document.getElementById('media-left');
                        const mRight = document.getElementById('media-right');
                        const mCenter = document.getElementById('media-center-link');

        // Mouse Move Listener
        document.addEventListener('mousemove', (e) => {
                            mouseX = e.clientX;
                        mouseY = e.clientY;

                        const x = (mouseX / window.innerWidth) - 0.5;
                        const y = (mouseY / window.innerHeight) - 0.5;
                        targetX = x * 20; // Max movement px
                        targetY = y * 20;
        });

                        // Animation Loop for Smooth Parallax & Cursor (Lerp)
                        function animate() {
                            // Parallax Ease
                            currentX += (targetX - currentX) * 0.05;
                        currentY += (targetY - currentY) * 0.05;

                        // Cursor Ease
                        cursorX += (mouseX - cursorX) * 0.15;
                        cursorY += (mouseY - cursorY) * 0.15;

                        // Apply slight transforms based on z-depth
                        if(mCenter && mLeft && mRight) {
                            mCenter.style.transform = `translate3d(${currentX * 1.5}px, ${currentY * 1.5}px, 0)`;
                        mLeft.style.transform = `translate3d(${-60 + currentX * -0.5}%, ${currentY * -0.5}px, 0) rotate(-6deg)`;
                        mRight.style.transform = `translate3d(${60 + currentX * -0.5}%, ${currentY * -0.5}px, 0) rotate(6deg)`;

                // Adjust translate percentage for larger screens to maintain layout
                if(window.innerWidth > 640) {
                            mLeft.style.transform = `translate3d(${-70 + currentX * -0.5}%, ${currentY * -0.5}px, 0) rotate(-6deg)`;
                        mRight.style.transform = `translate3d(${70 + currentX * -0.5}%, ${currentY * -0.5}px, 0) rotate(6deg)`;
                }
                if(window.innerWidth > 1024) {
                            mLeft.style.transform = `translate3d(${-90 + currentX * -0.5}%, ${currentY * -0.5}px, 0) rotate(-6deg)`;
                        mRight.style.transform = `translate3d(${90 + currentX * -0.5}%, ${currentY * -0.5}px, 0) rotate(6deg)`;
                }
            }

                        // Apply cursor position
                        cursorWrapper.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0)`;

                        requestAnimationFrame(animate);
        }

        // Handle Window Resize for Ticker Alignment
        window.addEventListener('resize', () => {
                            updateTickerPosition();
        });

                        // Start
                        init();
                        animate();

                    </script>
                </body>
            </html>
